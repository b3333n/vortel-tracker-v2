<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Vortel Tracker V2 - Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231a1a2e' stroke='%234CAF50' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='36' fill='none' stroke='%23f44336' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='24' fill='none' stroke='%234CAF50' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='12' fill='none' stroke='%23fff' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23fff'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-section {
            max-width: 450px;
            width: 100%;
            margin: 40px auto;
            text-align: center;
        }
        
        .auth-header {
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 16px 16px 0 0;
            padding: 50px 30px 30px;
            border-bottom: 2px solid #4CAF50;
        }
        
        .auth-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(76, 175, 80, 0.3));
        }
        
        .auth-brand {
            font-size: 2rem;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        .auth-subtitle {
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.5;
        }
        
        .auth-subtitle-icon {
            font-size: 1.2rem;
            margin-right: 6px;
        }
        
        .auth-form-card {
            background: #2d2d44;
            border-radius: 0 0 16px 16px;
            padding: 35px 30px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a2e;
            border: 2px solid #3d3d54;
            border-radius: 8px;
            color: #eee;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-primary:hover {
            background: #45a049;
        }
        
        .btn-secondary {
            background: #3d3d54;
            color: #eee;
            border: 2px solid #3d3d54;
        }
        
        .btn-secondary:hover {
            border-color: #4CAF50;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        .message.success {
            background: #1b5e20;
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }
        
        .message.error {
            background: #5e1b1b;
            color: #f44336;
            border: 1px solid #f44336;
        }
        
        .message.info {
            background: #1b3a5e;
            color: #2196F3;
            border: 1px solid #2196F3;
        }
        
        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }
        
        .otp-digit {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 1.5rem;
            padding: 0;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #3d3d54;
            margin-top: 30px;
        }
        
        .footer a {
            color: #888;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .footer a:hover {
            color: #4CAF50;
        }
        
        .copyright {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.75rem;
            color: #666;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="auth-section">
        <!-- Header with Logo & Branding -->
        <div class="auth-header">
            <svg class="auth-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#4CAF50" stroke-width="2"/>
                <circle cx="50" cy="50" r="36" fill="none" stroke="#f44336" stroke-width="3"/>
                <circle cx="50" cy="50" r="24" fill="none" stroke="#4CAF50" stroke-width="3"/>
                <circle cx="50" cy="50" r="12" fill="none" stroke="#fff" stroke-width="2"/>
                <circle cx="50" cy="50" r="4" fill="#fff"/>
            </svg>
            
            <div class="auth-brand">Vortel Tracker</div>
            
            <div class="auth-subtitle">
                <span class="auth-subtitle-icon">🎯</span>
                Tracke deine Schießergebnisse & werte sie direkt aus
            </div>
        </div>
        
        <!-- Login Form Card -->
        <div class="auth-form-card">
            <div id="auth-message"></div>
            
            <!-- Phase 1: Email Input -->
            <div id="login-phase-1">
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">📧 E-Mail-Adresse</label>
                        <input type="email" id="email" class="form-input" placeholder="deine@email.de" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;">
                        Code anfordern →
                    </button>
                </form>
                <div id="login-info" style="margin-top: 20px; color: #888; font-size: 0.9rem;">
                    Du erhältst einen 6-stelligen Code per E-Mail.
                </div>
            </div>
            
            <!-- Phase 2: Code Input (initial hidden) -->
            <div id="login-phase-2" style="display: none;">
                <div class="form-group" style="text-align: center;">
                    <label class="form-label">🔐 6-stelliger Code</label>
                    <div class="otp-inputs">
                        <input type="text" id="otp-1" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" id="otp-2" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" id="otp-3" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" id="otp-4" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" id="otp-5" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" id="otp-6" class="form-input otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    </div>
                </div>
                <button type="button" id="verify-otp-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;">
                    Einloggen →
                </button>
                <div style="margin-top: 15px; text-align: center;">
                    <button type="button" id="resend-code-btn" class="btn btn-secondary" style="font-size: 0.9rem; background: transparent; border: none; color: #888;" disabled>
                        Code erneut senden (<span id="resend-timer">60</span>s)
                    </button>
                </div>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="#" id="back-to-email" style="color: #888; font-size: 0.9rem; text-decoration: none;">← Andere E-Mail verwenden</a>
                </div>
            </div>
            
            <!-- Datenschutz Hinweis -->
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #3d3d54; font-size: 0.8rem; color: #666;">
                Mit der Anmeldung akzeptierst du unsere <a href="datenschutz.html" style="color: #4CAF50;">Datenschutzerklärung</a>.
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <a href="impressum.html">Impressum</a>
            <span style="color: #555;">|</span>
            <a href="datenschutz.html">Datenschutz</a>
        </div>
    </div>
    
    <!-- Copyright -->
    <div class="copyright">
        © Benedikt Popp 2026
    </div>
    
    <!-- Supabase Client -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <script>
        // Initialize Supabase
        const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                // Already logged in, redirect to app
                window.location.href = 'index.html';
            }
        });
        
        // OTP Login State
        let currentLoginEmail = '';
        let resendTimer = null;
        let resendCountdown = 60;
        
        const authMessage = document.getElementById('auth-message');
        const loginForm = document.getElementById('login-form');
        
        // Show message
        function showMessage(type, text) {
            authMessage.innerHTML = `<div class="message ${type}">${text}</div>`;
        }
        
        // Login form handler - Phase 1: Request OTP
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            currentLoginEmail = document.getElementById('email').value;
            
            showMessage('info', 'Sende Code...');
            
            const { error } = await supabase.auth.signInWithOtp({
                email: currentLoginEmail,
                options: { shouldCreateUser: true }
            });
            
            if (error) {
                showMessage('error', 'Fehler: ' + error.message);
            } else {
                showMessage('success', '✅ Code gesendet! Bitte E-Mail prüfen.');
                showLoginPhase(2);
                startResendTimer();
                setTimeout(() => document.getElementById('otp-1').focus(), 100);
            }
        });
        
        // Switch login phases
        function showLoginPhase(phase) {
            document.getElementById('login-phase-1').style.display = phase === 1 ? 'block' : 'none';
            document.getElementById('login-phase-2').style.display = phase === 2 ? 'block' : 'none';
        }
        
        // Start resend countdown
        function startResendTimer() {
            resendCountdown = 60;
            const btn = document.getElementById('resend-code-btn');
            const timerSpan = document.getElementById('resend-timer');
            
            btn.disabled = true;
            timerSpan.textContent = resendCountdown;
            
            resendTimer = setInterval(() => {
                resendCountdown--;
                timerSpan.textContent = resendCountdown;
                
                if (resendCountdown <= 0) {
                    clearInterval(resendTimer);
                    btn.disabled = false;
                    btn.innerHTML = 'Code erneut senden';
                }
            }, 1000);
        }
        
        // OTP Input Auto-Tab
        document.querySelectorAll('.otp-digit').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                if (!/^\d*$/.test(val)) {
                    e.target.value = '';
                    return;
                }
                if (val && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
                if (allFilled) {
                    document.getElementById('verify-otp-btn').focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((digit, i) => {
                    if (inputs[i]) inputs[i].value = digit;
                });
                if (pasted.length === 6) {
                    document.getElementById('verify-otp-btn').focus();
                }
            });
        });
        
        // Verify OTP
        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const digits = [];
            for (let i = 1; i <= 6; i++) {
                digits.push(document.getElementById(`otp-${i}`).value);
            }
            const token = digits.join('');
            
            if (token.length !== 6) {
                showMessage('error', 'Bitte 6-stelligen Code eingeben');
                return;
            }
            
            showMessage('info', 'Überprüfe Code...');
            
            const { data, error } = await supabase.auth.verifyOtp({
                email: currentLoginEmail,
                token: token,
                type: 'email'
            });
            
            if (error) {
                showMessage('error', 'Falscher Code. Bitte erneut versuchen.');
                document.querySelectorAll('.otp-digit').forEach(inp => inp.value = '');
                document.getElementById('otp-1').focus();
            } else {
                showMessage('success', '✅ Erfolgreich eingeloggt!');
                clearInterval(resendTimer);
                // Redirect to main app
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            }
        });
        
        // Resend code
        document.getElementById('resend-code-btn').addEventListener('click', async () => {
            showMessage('info', 'Sende neuen Code...');
            
            const { error } = await supabase.auth.signInWithOtp({
                email: currentLoginEmail,
                options: { shouldCreateUser: true }
            });
            
            if (error) {
                showMessage('error', 'Fehler: ' + error.message);
            } else {
                showMessage('success', '✅ Neuer Code gesendet!');
                startResendTimer();
                document.querySelectorAll('.otp-digit').forEach(inp => inp.value = '');
                document.getElementById('otp-1').focus();
            }
        });
        
        // Back to email
        document.getElementById('back-to-email').addEventListener('click', (e) => {
            e.preventDefault();
            clearInterval(resendTimer);
            showLoginPhase(1);
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
